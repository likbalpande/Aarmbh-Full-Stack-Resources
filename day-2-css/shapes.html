<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        div {
            height: 200px;
            width: 200px;
            background-color: aqua;
            margin: 10px 10px 10px 10px;
            border: 20px solid brown;
        }

        #square-rounded {
            border-radius: 30px;
        }

        #circle {
            border-radius: 200px;
        }

        #something {
            border-top: 20px solid darkblue;
        }
    </style>
</head>

<body>
    <div>Square - Sharp</div>
    <div id="square-rounded">Square - Rounded</div>
    <div id="circle">Circle</div>
    <div id="something">Something</div>
</body>

</html>
